<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/logo-title.png" type="image/png" />
    <title>DeSpace Smart Chain</title>
    <script>
      // Early workaround for TronLink extension proxy error in sandboxed environments
      (function() {
        // 1. Try to pre-define the property to avoid proxy 'set' traps if possible
        try {
          var _tp = window.tronlinkParams || {};
          Object.defineProperty(window, 'tronlinkParams', {
            get: function() { return _tp; },
            set: function(v) { _tp = v; return true; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          // If defineProperty fails, we'll rely on the error listeners below
        }

        // 2. Intercept and silence the specific proxy error
        var silenceError = function(e) {
          var msg = (e && e.message) || (e && e.reason && e.reason.message) || "";
          if (typeof msg === 'string' && msg.indexOf('tronlinkParams') !== -1) {
            if (e.stopImmediatePropagation) e.stopImmediatePropagation();
            if (e.preventDefault) e.preventDefault();
            return true;
          }
          return false;
        };

        window.addEventListener('error', silenceError, true);
        window.addEventListener('unhandledrejection', silenceError, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
